name: Build Perses

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Linux
            os: ubuntu-latest
          - target: Windows
            os: windows-2022
          - target: Android
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11' 
          distribution: 'temurin'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Setup Android Environment (Android Target Only)
        if: matrix.target == 'Android'
        run: |
          # GitHub's ubuntu-latest runner comes with the Android SDK & NDK pre-installed.
          # We export the environment variables just in case your Bazel WORKSPACE expects them.
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Build Perses (Linux / Android)
        if: matrix.os == 'ubuntu-latest'
        run: bazel build //src/org/perses:perses_deploy.jar

      - name: Build Perses (Windows)
        if: matrix.os == 'windows-2022'
        run: bazel --output_user_root=C:\b build //src/org/perses:perses_deploy.jar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_${{ matrix.target }}
          path: bazel-bin/src/org/perses/perses_deploy.jar
          if-no-files-found: error
