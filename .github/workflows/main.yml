name: Build Perses

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Linux
            os: ubuntu-latest
          - target: Windows
            os: windows-2022
          - target: Android
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11' 
          distribution: 'temurin'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # ------ BUILD STEPS ------

      - name: Build Perses (Linux / Android)
        if: matrix.os == 'ubuntu-latest'
        run: bazel build //src/org/perses:perses_deploy.jar

      - name: Build Perses (Windows)
        if: matrix.os == 'windows-2022'
        run: bazel --output_user_root=C:\b build //src/org/perses:perses_deploy.jar

      # ------ ANDROID SPECIFIC: CONVERT TO DEX ------

      - name: Convert to Dalvik Executable (Android Target Only)
        if: matrix.target == 'Android'
        run: |
          # 1. Find tools
          BUILD_TOOLS_DIR=$(ls -1d $ANDROID_HOME/build-tools/* | tail -n 1)
          D8_TOOL="$BUILD_TOOLS_DIR/d8"
          PLATFORM_DIR=$(ls -1d $ANDROID_HOME/platforms/android-* | sort -V | tail -n 1)
          ANDROID_JAR="$PLATFORM_DIR/android.jar"
          
          ORIGINAL_JAR="bazel-bin/src/org/perses/perses_deploy.jar"
          ANDROID_JAR_OUT="bazel-bin/src/org/perses/perses_android.jar"

          # 2. Run d8 to generate classes.dex
          # We output to a temporary directory to avoid conflicts
          mkdir -p dex_out
          $D8_TOOL "$ORIGINAL_JAR" \
            --lib "$ANDROID_JAR" \
            --min-api 26 \
            --output dex_out/
          
          # 3. Create the final Android JAR
          # We start with a copy of the original JAR (which has all the .g4 files and resources)
          cp "$ORIGINAL_JAR" "$ANDROID_JAR_OUT"
          
          # 4. Add the classes.dex into the root of that JAR
          # Android's dalvikvm needs 'classes.dex' at the root to run
          cd dex_out
          zip -u "../$ANDROID_JAR_OUT" classes.dex
          
          # 5. (Optional) Remove the old .class files to save space
          # This isn't strictly necessary but makes the JAR cleaner for Android
          zip -d "../$ANDROID_JAR_OUT" "**/*.class"

      # ------ UPLOAD ARTIFACTS ------

      - name: Upload Artifact (Linux / Windows)
        if: matrix.target != 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_${{ matrix.target }}
          path: bazel-bin/src/org/perses/perses_deploy.jar
          if-no-files-found: error

      - name: Upload Artifact (Android)
        if: matrix.target == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_Android
          path: bazel-bin/src/org/perses/perses_android.jar
          if-no-files-found: error