name: Build Perses

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Linux
            os: ubuntu-latest
          - target: Windows
            os: windows-2022
          - target: Android
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11' 
          distribution: 'temurin'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # ------ BUILD STEPS ------

      - name: Build Perses (Linux / Android)
        if: matrix.os == 'ubuntu-latest'
        run: bazel build //src/org/perses:perses_deploy.jar

      - name: Build Perses (Windows)
        if: matrix.os == 'windows-2022'
        run: bazel --output_user_root=C:\b build //src/org/perses:perses_deploy.jar

      # ------ ANDROID SPECIFIC: CONVERT TO DEX ------

      - name: Convert to Dalvik Executable (Android Target Only)
        if: matrix.target == 'Android'
        run: |
          # 1. Locate tools and paths
          BUILD_TOOLS_DIR=$(ls -1d $ANDROID_HOME/build-tools/* | tail -n 1)
          D8_TOOL="$BUILD_TOOLS_DIR/d8"
          PLATFORM_DIR=$(ls -1d $ANDROID_HOME/platforms/android-* | sort -V | tail -n 1)
          ANDROID_JAR="$PLATFORM_DIR/android.jar"
          
          # Use absolute paths outside of the bazel-bin symlink tree
          ORIGINAL_JAR="$(pwd)/bazel-bin/src/org/perses/perses_deploy.jar"
          WORKING_JAR="$(pwd)/perses_android.jar"
          
          echo "Using d8 tool from: $D8_TOOL"
          
          # 2. Copy the original JAR to a writable location
          cp "$ORIGINAL_JAR" "$WORKING_JAR"
          
          # 3. Run d8 to generate classes.dex
          mkdir -p dex_out
          $D8_TOOL "$ORIGINAL_JAR" \
            --lib "$ANDROID_JAR" \
            --min-api 26 \
            --output dex_out/
          
          # 4. Add classes.dex to the root of the JAR
          # -j (junk paths) ensures classes.dex is at the root, not inside dex_out/
          zip -ju "$WORKING_JAR" dex_out/classes.dex
          
          # 5. Clean up .class files (optional but recommended for Android)
          zip -d "$WORKING_JAR" "**/*.class"

      - name: Upload Artifact (Android)
        if: matrix.target == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_Android
          # Note: The path is now in the root workspace
          path: perses_android.jar
          if-no-files-found: error

      # ------ UPLOAD ARTIFACTS ------

      - name: Upload Artifact (Linux / Windows)
        if: matrix.target != 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_${{ matrix.target }}
          path: bazel-bin/src/org/perses/perses_deploy.jar
          if-no-files-found: error

      - name: Upload Artifact (Android)
        if: matrix.target == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_Android
          path: bazel-bin/src/org/perses/perses_android.jar
          if-no-files-found: error