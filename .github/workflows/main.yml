name: Build Perses

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Linux
            os: ubuntu-latest
          - target: Windows
            os: windows-2022
          - target: Android
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11' 
          distribution: 'temurin'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # ------ BUILD STEPS ------

      - name: Build Perses (Linux / Android)
        if: matrix.os == 'ubuntu-latest'
        run: bazel build //src/org/perses:perses_deploy.jar

      - name: Build Perses (Windows)
        if: matrix.os == 'windows-2022'
        run: bazel --output_user_root=C:\b build //src/org/perses:perses_deploy.jar

      # ------ ANDROID SPECIFIC: CONVERT TO DEX ------

      - name: Convert to Dalvik Executable (Android Target Only)
        if: matrix.target == 'Android'
        run: |
          # Find the latest installed Android build-tools directory on the runner
          BUILD_TOOLS_DIR=$(ls -1d $ANDROID_HOME/build-tools/* | tail -n 1)
          D8_TOOL="$BUILD_TOOLS_DIR/d8"
          
          # Find the latest Android platform jar (android.jar)
          PLATFORM_DIR=$(ls -1d $ANDROID_HOME/platforms/android-* | sort -V | tail -n 1)
          ANDROID_JAR="$PLATFORM_DIR/android.jar"
          
          echo "Using d8 tool from: $D8_TOOL"
          echo "Using android.jar from: $ANDROID_JAR"
          
          # Convert standard Java bytecode to DEX bytecode packaged as perses_android.jar
          # --min-api 26 assumes you are running this on Android 8.0 or newer
          $D8_TOOL bazel-bin/src/org/perses/perses_deploy.jar \
            --lib "$ANDROID_JAR" \
            --min-api 26 \
            --output bazel-bin/src/org/perses/perses_android.jar

      # ------ UPLOAD ARTIFACTS ------

      - name: Upload Artifact (Linux / Windows)
        if: matrix.target != 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_${{ matrix.target }}
          path: bazel-bin/src/org/perses/perses_deploy.jar
          if-no-files-found: error

      - name: Upload Artifact (Android)
        if: matrix.target == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: perses_deploy_Android
          path: bazel-bin/src/org/perses/perses_android.jar
          if-no-files-found: error